name: 🧪 Test & Build Pipeline

on:
  push:
    branches: [ main, develop, 'feature/*', 'fix/*', 'release/*' ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:  # 수동 트리거 허용

env:
  NODE_VERSION: '20.18.0'
  CACHE_VERSION: v1

jobs:
  # 🧪 테스트 작업
  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [api-server, main-site, admin-dashboard]
    
    steps:
      - name: 📦 Checkout code
        uses: actions/checkout@v4
        
      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: 📥 Install dependencies
        run: |
          npm ci
          npm run install:all
          
      - name: 🔍 Type check
        run: npm run type-check --workspace=@o4o/${{ matrix.service }}
        
      - name: 🧹 Lint check
        run: npm run lint --workspace=@o4o/${{ matrix.service }}
        
      - name: 🧪 Run tests
        run: npm run test --workspace=@o4o/${{ matrix.service }}
        
      - name: 📊 Upload coverage reports
        uses: codecov/codecov-action@v4
        if: matrix.service == 'admin-dashboard'
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: ./apps/${{ matrix.service }}/coverage/lcov.info
          flags: ${{ matrix.service }}

  # 🏗️ 빌드 작업
  build:
    name: 🏗️ Build
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        service: [api-server, main-site, admin-dashboard]
    
    steps:
      - name: 📦 Checkout code
        uses: actions/checkout@v4
        
      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: 📥 Install dependencies
        run: |
          npm ci
          npm run install:all
          
      - name: 🏗️ Build service
        run: npm run build --workspace=@o4o/${{ matrix.service }}
        
      - name: 📦 Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.service }}
          path: apps/${{ matrix.service }}/dist/
          retention-days: 7

  # 🔒 보안 스캔
  security:
    name: 🔒 Security Scan
    runs-on: ubuntu-latest
    
    steps:
      - name: 📦 Checkout code
        uses: actions/checkout@v4
        
      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: 📥 Install dependencies
        run: |
          npm ci
          npm run install:all
        
      - name: 🔍 Run npm audit
        run: npm audit --audit-level moderate
        
      - name: 🛡️ Run Snyk security scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=medium

  # 📊 코드 품질 분석
  quality:
    name: 📊 Code Quality
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - name: 📦 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # SonarCloud 분석을 위해 전체 히스토리 필요
          
      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: 📥 Install dependencies
        run: |
          npm ci
          npm run install:all
          
      - name: 🧪 Run tests with coverage
        run: npm run test:coverage --workspace=@o4o/admin-dashboard
        
      - name: 📊 SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=renagang21
            -Dsonar.projectKey=o4o-platform
            -Dsonar.sources=apps/,packages/
            -Dsonar.exclusions=**/node_modules/**,**/dist/**,**/build/**

  # 🚀 배포 준비 (main 브랜치만)
  deploy-staging:
    name: 🚀 Deploy to Staging
    runs-on: ubuntu-latest
    needs: [test, build, security, quality]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: staging
    
    steps:
      - name: 📦 Checkout code
        uses: actions/checkout@v4
        
      - name: 📥 Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: build-*
          path: builds/
          
      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          
      - name: 🚀 Deploy to AWS Lightsail (Staging)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          STAGING_HOST: ${{ secrets.STAGING_HOST }}
          STAGING_USER: ${{ secrets.STAGING_USER }}
          STAGING_KEY: ${{ secrets.STAGING_PRIVATE_KEY }}
        run: |
          echo "🚀 Deploying to staging environment..."
          # 실제 배포 스크립트 실행
          chmod +x ./scripts/deploy-staging.sh
          ./scripts/deploy-staging.sh
          
      - name: 🔍 Health check
        run: |
          echo "🏥 Running health checks..."
          sleep 30  # 서비스 시작 대기
          curl -f http://${{ secrets.STAGING_HOST }}/health || exit 1
          echo "✅ Staging deployment successful!"

  # 📱 E2E 테스트 (스테이징 환경)
  e2e-test:
    name: 📱 E2E Tests
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: 📦 Checkout code
        uses: actions/checkout@v4
        
      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: 📥 Install dependencies
        run: npm ci
        
      - name: 📱 Install Playwright
        run: npx playwright install --with-deps
        
      - name: 🧪 Run E2E tests
        env:
          BASE_URL: http://${{ secrets.STAGING_HOST }}
        run: npm run test:e2e
        
      - name: 📊 Upload E2E test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-test-results
          path: test-results/
          retention-days: 30

  # 🏷️ 릴리즈 태그 생성
  release:
    name: 🏷️ Create Release
    runs-on: ubuntu-latest
    needs: [test, build, security, quality, e2e-test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: 📦 Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      - name: 🏷️ Generate version tag
        id: tag
        run: |
          # package.json에서 버전 읽기
          VERSION=$(node -p "require('./package.json').version")
          echo "version=v$VERSION" >> $GITHUB_OUTPUT
          echo "Generated version tag: v$VERSION"
          
      - name: 📝 Generate changelog
        id: changelog
        run: |
          # 최근 커밋들로부터 changelog 생성
          git log --pretty=format:"- %s (%h)" $(git describe --tags --abbrev=0)..HEAD > CHANGELOG.md
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          cat CHANGELOG.md >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          
      - name: 🏷️ Create GitHub Release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.tag.outputs.version }}
          release_name: Release ${{ steps.tag.outputs.version }}
          body: |
            ## 🎉 What's New
            
            ${{ steps.changelog.outputs.changelog }}
            
            ## 🚀 Deployment
            - ✅ Staging: http://${{ secrets.STAGING_HOST }}
            - 🔄 Production: Ready for deployment
            
            ## 📊 Metrics
            - Test Coverage: See artifacts
            - Build Size: See artifacts
            - Performance: See E2E test results
          draft: false
          prerelease: false

  # 🔔 알림
  notify:
    name: 🔔 Notifications
    runs-on: ubuntu-latest
    needs: [test, build, security, quality]
    if: always()
    
    steps:
      - name: 📊 Check workflow status
        id: status
        run: |
          if [[ "${{ needs.test.result }}" == "success" && "${{ needs.build.result }}" == "success" && "${{ needs.security.result }}" == "success" && "${{ needs.quality.result }}" == "success" ]]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "message=✅ All checks passed successfully!" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "message=❌ Some checks failed. Please review the results." >> $GITHUB_OUTPUT
          fi
          
      - name: 🔔 Send Slack notification
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ steps.status.outputs.status }}
          text: |
            ${{ steps.status.outputs.message }}
            
            📊 Results:
            - Tests: ${{ needs.test.result }}
            - Build: ${{ needs.build.result }}
            - Security: ${{ needs.security.result }}
            - Quality: ${{ needs.quality.result }}
            
            🔗 View details: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        if: env.SLACK_WEBHOOK_URL != ''

  # 📊 성능 벤치마크
  performance:
    name: 📊 Performance Benchmark
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - name: 📦 Checkout code
        uses: actions/checkout@v4
        
      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          
      - name: 📊 Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v10
        with:
          urls: |
            http://${{ secrets.STAGING_HOST }}
            http://${{ secrets.STAGING_HOST }}/admin
          configPath: './.lighthouserc.json'
          uploadArtifacts: true
          temporaryPublicStorage: true
          
      - name: 📈 Performance Budget Check
        run: |
          echo "📊 Performance budget check completed"
          echo "🔗 Lighthouse results available in artifacts"
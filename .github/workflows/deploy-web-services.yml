name: Deploy Web Services (Cloud Run)

# Deploy web services to Cloud Run on push to main/develop
# H9-0: Docker(Container) 배포 방식으로 전환
# 변경된 웹서버만 배포됨

concurrency:
  group: deploy-web-${{ github.ref }}
  cancel-in-progress: false

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'services/web-neture/**'
      - 'services/web-k-cosmetics/**'
      - 'services/web-kpa-society/**'
      - 'services/web-glycopharm/**'
      - 'packages/**'
      - '.github/workflows/deploy-web-services.yml'
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to deploy (all, neture, k-cosmetics, kpa-society, glycopharm)'
        required: false
        default: 'all'

env:
  PROJECT_ID: netureyoutube
  REGION: asia-northeast3
  # Default API URL (neture uses this)
  VITE_API_BASE_URL: https://api.neture.co.kr
  # Service-specific API URLs (same-origin for cookie auth)
  VITE_API_URL_GLYCOPHARM: https://api.neture.co.kr
  VITE_API_URL_KPA_SOCIETY: https://api.neture.co.kr
  VITE_API_URL_K_COSMETICS: https://api.neture.co.kr
  VITE_KPA_URL: https://kpa-society-web-3e3aws7zqa-du.a.run.app
  # WO-O4O-DOMAIN-SSOT-CANONICALIZATION-V1: per-service canonical URL injected as build-arg.
  # Values mirror apps/api-server/src/config/service-catalog.ts O4O_SERVICES[].domain.
  VITE_SERVICE_URL_NETURE: https://neture.co.kr
  VITE_SERVICE_URL_GLYCOPHARM: https://glycopharm.co.kr
  VITE_SERVICE_URL_KPA_SOCIETY: https://kpa-society.co.kr
  VITE_SERVICE_URL_K_COSMETICS: https://k-cosmetics.site

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      neture: ${{ steps.changes.outputs.neture }}
      k-cosmetics: ${{ steps.changes.outputs.k-cosmetics }}
      kpa-society: ${{ steps.changes.outputs.kpa-society }}
      glycopharm: ${{ steps.changes.outputs.glycopharm }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          # WO-O4O-WEB-DEPLOY-DETECT-CHANGES-LAST-DEPLOYED-SHA-V1:
          # full history needed to diff github.event.before..github.sha (multi-commit push batch)
          fetch-depth: 0

      - name: Detect changed services
        id: changes
        run: |
          # For workflow_dispatch with specific service
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SERVICE="${{ github.event.inputs.service }}"
            if [ "$SERVICE" = "all" ]; then
              echo "neture=true" >> $GITHUB_OUTPUT
              echo "k-cosmetics=true" >> $GITHUB_OUTPUT
              echo "kpa-society=true" >> $GITHUB_OUTPUT
              echo "glycopharm=true" >> $GITHUB_OUTPUT
            else
              echo "neture=$( [ "$SERVICE" = 'neture' ] && echo 'true' || echo 'false' )" >> $GITHUB_OUTPUT
              echo "k-cosmetics=$( [ "$SERVICE" = 'k-cosmetics' ] && echo 'true' || echo 'false' )" >> $GITHUB_OUTPUT
              echo "kpa-society=$( [ "$SERVICE" = 'kpa-society' ] && echo 'true' || echo 'false' )" >> $GITHUB_OUTPUT
              echo "glycopharm=$( [ "$SERVICE" = 'glycopharm' ] && echo 'true' || echo 'false' )" >> $GITHUB_OUTPUT
            fi
            exit 0
          fi

          # WO-O4O-WEB-DEPLOY-DETECT-CHANGES-LAST-DEPLOYED-SHA-V1:
          # push events — compare the WHOLE pushed batch (event.before..github.sha) instead of
          # tip-only (HEAD~1 HEAD). tip-only skipped web deploys when a docs-only/other commit
          # became HEAD after the web-change commit in the same push.
          HEAD_SHA="${{ github.sha }}"
          BASE_SHA="${{ github.event.before }}"

          # fallback when before is unusable: all-zeros (new branch / first push / force push)
          # or not present locally → use HEAD~1; if even that is missing, force ALL (safe).
          if [ -z "$BASE_SHA" ] || [ "$BASE_SHA" = "0000000000000000000000000000000000000000" ] || ! git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null; then
            echo "event.before unusable ('${BASE_SHA}') — fallback to HEAD~1"
            BASE_SHA=$(git rev-parse HEAD~1 2>/dev/null || echo "")
          fi

          if [ -n "$BASE_SHA" ]; then
            CHANGED_FILES=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
            FORCE_ALL=0
          else
            echo "no usable base SHA — forcing ALL web services (safe default)"
            CHANGED_FILES=""
            FORCE_ALL=1
          fi

          echo "event=push"
          echo "base_sha=${BASE_SHA:-<none>}"
          echo "head_sha=${HEAD_SHA}"
          echo "Changed files:"
          echo "$CHANGED_FILES"

          # Shared packages changed (or no base) → rebuild ALL web services
          if [ "$FORCE_ALL" = "1" ] || echo "$CHANGED_FILES" | grep -q "^packages/"; then
            echo "decision: shared packages changed or forced — rebuilding all web services"
            echo "neture=true" >> $GITHUB_OUTPUT
            echo "k-cosmetics=true" >> $GITHUB_OUTPUT
            echo "kpa-society=true" >> $GITHUB_OUTPUT
            echo "glycopharm=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Per-service detection (helper logs the decision)
          decide() {
            local svc="$1" path="$2"
            if echo "$CHANGED_FILES" | grep -q "^${path}"; then
              echo "${svc}=true" >> $GITHUB_OUTPUT
              echo "decision: ${svc}=true (matched ${path})"
            else
              echo "${svc}=false" >> $GITHUB_OUTPUT
              echo "decision: ${svc}=false"
            fi
          }
          decide "neture" "services/web-neture/"
          decide "k-cosmetics" "services/web-k-cosmetics/"
          decide "kpa-society" "services/web-kpa-society/"
          decide "glycopharm" "services/web-glycopharm/"

  deploy-neture:
    needs: detect-changes
    if: needs.detect-changes.outputs.neture == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker gcr.io --quiet

      - name: Build and push Docker image
        run: |
          echo "Building neture-web Docker image..."
          IMAGE_TAG="${{ github.sha }}"

          # Build from repo root with Dockerfile path (for workspace packages)
          docker build \
            --platform linux/amd64 \
            --build-arg VITE_API_BASE_URL=${{ env.VITE_API_BASE_URL }} \
            --build-arg VITE_SERVICE_URL=${{ env.VITE_SERVICE_URL_NETURE }} \
            -f services/web-neture/Dockerfile \
            -t gcr.io/${{ env.PROJECT_ID }}/neture-web:${IMAGE_TAG} \
            -t gcr.io/${{ env.PROJECT_ID }}/neture-web:latest \
            .

          docker push gcr.io/${{ env.PROJECT_ID }}/neture-web:${IMAGE_TAG}
          docker push gcr.io/${{ env.PROJECT_ID }}/neture-web:latest

      - name: Deploy to Cloud Run
        run: |
          echo "Deploying neture-web to Cloud Run..."

          gcloud run deploy neture-web \
            --image=gcr.io/${{ env.PROJECT_ID }}/neture-web:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --platform=managed \
            --allow-unauthenticated \
            --port=8080 \
            --memory=256Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=5

          echo "neture-web deployed successfully!"

      - name: Verify deployment
        run: |
          SERVICE_URL=$(gcloud run services describe neture-web \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --format="value(status.url)")

          echo "Service URL: ${SERVICE_URL}"

          if curl -sf "${SERVICE_URL}" > /dev/null; then
            echo "neture-web is accessible!"
          else
            echo "neture-web may need a moment to start"
          fi

  deploy-k-cosmetics:
    needs: detect-changes
    if: needs.detect-changes.outputs.k-cosmetics == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ env.PROJECT_ID }}

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker gcr.io --quiet

      - name: Build and push Docker image
        run: |
          echo "Building k-cosmetics-web Docker image..."
          IMAGE_TAG="${{ github.sha }}"

          # Build from repo root with Dockerfile path (for workspace packages)
          docker build \
            --platform linux/amd64 \
            --build-arg VITE_API_BASE_URL=${{ env.VITE_API_URL_K_COSMETICS }} \
            --build-arg VITE_SERVICE_URL=${{ env.VITE_SERVICE_URL_K_COSMETICS }} \
            -f services/web-k-cosmetics/Dockerfile \
            -t gcr.io/${{ env.PROJECT_ID }}/k-cosmetics-web:${IMAGE_TAG} \
            -t gcr.io/${{ env.PROJECT_ID }}/k-cosmetics-web:latest \
            .

          docker push gcr.io/${{ env.PROJECT_ID }}/k-cosmetics-web:${IMAGE_TAG}
          docker push gcr.io/${{ env.PROJECT_ID }}/k-cosmetics-web:latest

      - name: Deploy to Cloud Run
        run: |
          echo "Deploying k-cosmetics-web to Cloud Run..."

          gcloud run deploy k-cosmetics-web \
            --image=gcr.io/${{ env.PROJECT_ID }}/k-cosmetics-web:${{ github.sha }} \
            --region=${{ env.REGION }} \
            --project=${{ env.PROJECT_ID }} \
            --platform=managed \
            --allow-unauthenticated \
            --port=8080 \
            --memory=256Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=5

          echo "k-cosmetics-web deployed successfully!"

      - name: Verify deployment
        run: |
          SERVICE_URL=$(gcloud run services describe k-cosmetics-web \
            --region=${{ env.REGION }} \

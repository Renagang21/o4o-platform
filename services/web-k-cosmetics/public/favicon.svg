<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background: rounded square, rose brand color -->
  <rect width="32" height="32" rx="7" fill="#E11D48"/>
  <!-- "K" letterform in white -->
  <text
    x="16"
    y="23"
    font-family="'Helvetica Neue', Arial, sans-serif"
    font-size="20"
    font-weight="700"
    fill="white"
    text-anchor="middle"
    letter-spacing="-0.5"
  >K</text>
  <!-- Decorative accent: small horizontal line under K (cosmetics brush motif) -->
